name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
      tag:
        description: 'Git Tag to checkout'
        required: true
        type: string

jobs:
  release:
    runs-on: macOS-12
    steps:

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: 'SagerNet/sing-box'
          path: 'box'
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Ensure Go Modules are Tidy
        run: |
          cd box
          go mod tidy
          go mod download

      - name: Setup Gomobile
        run: |
          cd box
          make lib_install
          gomobile init

      - name: Build xcframework
        run: |
          cd box
          go run ./cmd/internal/build_libbox -target=ios
          zip -ry ./Libbox.xcframework.zip ./Libbox.xcframework

      - name: Detect checksum
        run: |
          TEMP=$(shasum -a 256 box/Libbox.xcframework.zip)
          CHECKSUM=${TEMP:0:64}
          echo "FILE_CHECKSUM=${CHECKSUM}" >> $GITHUB_ENV

      - name: Update package file
        run: |
          echo "// swift-tools-version: 5.7" > Package.swift
          echo "" >> Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "" >> Package.swift
          echo "let package = Package(" >> Package.swift
          echo "  name: \"Libbox\"," >> Package.swift
          echo "  platforms: [.iOS(.v12)]," >> Package.swift
          echo "  products: [" >> Package.swift
          echo "    .library(name: \"Libbox\", targets: [\"Libbox\"])" >> Package.swift
          echo "  ]," >> Package.swift
          echo "  targets: [" >> Package.swift
          echo "    .binaryTarget(" >> Package.swift
          echo "      name: \"Libbox\"," >> Package.swift
          echo "      url: \"https://github.com/proother/sing-box-lib/releases/download/${{ github.event.inputs.version }}/Libbox.xcframework.zip\"," >> Package.swift
          echo "      checksum: \"${{ env.FILE_CHECKSUM }}\"" >> Package.swift
          echo "    )" >> Package.swift
          echo "  ]" >> Package.swift
          echo ")" >> Package.swift

      - name: Check if tag exists
        id: tag_exists
        run: |
          if git rev-parse ${{ github.event.inputs.version }} >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_ENV
          else
            echo "tag_exists=false" >> $GITHUB_ENV
          fi

      - name: Commit and tag
        if: env.tag_exists == 'false'
        run: |
          git config --global user.name "proother"
          git config --global user.email "proother@other.pro"
          git add Package.swift
          git commit -m "Libbox Release ${{ github.event.inputs.version }}"
          git tag -a ${{ github.event.inputs.version }} -m "${{ github.event.inputs.version }}"
          git push origin main --tags

      - name: Upload Release
        if: env.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.event.inputs.version }}
          body: 'Compiled from source tag: ${{ github.event.inputs.tag }}'
          files: box/Libbox.xcframework.zip
