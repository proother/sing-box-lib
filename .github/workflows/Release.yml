name: Release

on:
  # Keep manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string
      tag:
        description: "Git Tag to checkout (e.g. v1.10.5)"
        required: true
        type: string

  # Daily cron job at midnight (UTC). Adjust if you like.
  schedule:
    - cron: "0 0 * * *"

jobs:
  release:
    runs-on: macos-latest
    
    # Strategy: For the daily job, we first find the latest sing-box release
    # and decide whether we need to proceed with the build.
    steps:
      # 1) If it's a schedule trigger, get the latest release from SagerNet/sing-box
      - name: Get latest sing-box release
        if: ${{ github.event_name == 'schedule' }}
        id: get_latest_release
        uses: actions/github-script@v6
        with:
          script: |
            const { data: latest } = await github.repos.getLatestRelease({
              owner: 'SagerNet',
              repo: 'sing-box'
            })
            core.setOutput('latest_tag', latest.tag_name)

      # 2) Set environment variables for version/tag
      #
      # If it's a schedule-based trigger, use the new version from get_latest_release.
      # If it's a workflow_dispatch-based trigger, use the user inputs.
      - name: Define version/tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "VERSION=${{ steps.get_latest_release.outputs.latest_tag }}" >> $GITHUB_ENV
            echo "TAG=${{ steps.get_latest_release.outputs.latest_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
        shell: bash

      # 3) OPTIONAL: Check if we've already released this version/tag
      #
      #  If you keep a record of your last release somewhere, you can skip if it matches.
      #  This is just a minimal example using the GitHub CLI to check if a release already exists.
      - name: Check if release already exists
        id: check_existing_release
        run: |
          # Install GitHub CLI if not available
          sudo apt-get update && sudo apt-get install -y jq
          existing_release=$(gh release list --limit 100 | grep "^${VERSION}" | wc -l || true)
          if [ "$existing_release" != "0" ]; then
            echo "Release ${VERSION} already exists. Skipping."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV

      # 4) Stop if the release already exists
      - name: Stop job if release already exists
        if: env.SKIP_RELEASE == 'true'
        run: |
          echo "Nothing to do."

      # 5) Check out *your* repo (for Package.swift updates, etc.)
      - name: Checkout your repo
        if: env.SKIP_RELEASE == 'false'
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 6) Check out sing-box source in subfolder `box/`
      - name: Checkout sing-box
        if: env.SKIP_RELEASE == 'false'
        uses: actions/checkout@v3
        with:
          repository: 'SagerNet/sing-box'
          path: 'box'
          # Use the tag determined above
          ref: ${{ env.TAG }}
          submodules: 'recursive'
          fetch-depth: 0

      # 7) Setup Go
      - name: Setup Go
        if: env.SKIP_RELEASE == 'false'
        uses: actions/setup-go@v3.5.0
        with:
          go-version: '^1.23'

      # 8) Install iOS library dependencies
      - name: Install dependencies
        if: env.SKIP_RELEASE == 'false'
        run: |
          cd box
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile init

      # 9) Build the xcframework
      - name: Build xcframework
        if: env.SKIP_RELEASE == 'false'
        run: |
          cd box
          go run ./cmd/internal/build_libbox -target apple -platform ios
          zip -ry Libbox.xcframework.zip Libbox.xcframework

      # 10) Calculate shasum
      - name: Detect checksum
        if: env.SKIP_RELEASE == 'false'
        run: |
          export TEMP="$(shasum -a 256 box/Libbox.xcframework.zip)"
          export CHECKSUM="${TEMP:0:64}"
          echo "FILE_CHECKSUM=${CHECKSUM}" >> $GITHUB_ENV

      # 11) Update Package.swift
      - name: Update package file
        if: env.SKIP_RELEASE == 'false'
        run: |
          echo "// swift-tools-version: 5.7" > Package.swift
          echo "" >> Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "" >> Package.swift
          echo "let package = Package(" >> Package.swift
          echo "  name: \"Libbox\"," >> Package.swift
          echo "  platforms: [.iOS(.v12)]," >> Package.swift
          echo "  products: [" >> Package.swift
          echo "    .library(name: \"Libbox\", targets: [\"Libbox\"])" >> Package.swift
          echo "  ]," >> Package.swift
          echo "  targets: [" >> Package.swift
          echo "    .binaryTarget(" >> Package.swift
          echo "      name: \"Libbox\"," >> Package.swift
          echo "      url: \"https://github.com/EbrahimTahernejad/sing-box-lib/releases/download/${VERSION}/Libbox.xcframework.zip\"," >> Package.swift
          echo "      checksum: \"${FILE_CHECKSUM}\"" >> Package.swift
          echo "    )" >> Package.swift
          echo "  ]" >> Package.swift
          echo ")" >> Package.swift

      # 12) Commit your Package.swift update
      - name: Commit package update
        if: env.SKIP_RELEASE == 'false'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Libbox Release ${VERSION}"
          commit_user_name: "Ebrahim"
          commit_user_email: "ebrahimtahernejad@gmail.com"
          tagging_message: "${VERSION}"
          file_pattern: 'Package.swift'

      # 13) Create a new GitHub Release with the zipped .xcframework
      - name: Upload Release
        if: env.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          tag_name: ${{ env.VERSION }}
          body: "Compiled from source tag: ${{ env.TAG }}"
          files: "box/Libbox.xcframework.zip"
